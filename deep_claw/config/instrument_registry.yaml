# Deep Claw — Instrument Registry
# Single config object read by both notional_router.py (Cognition) and Action adapters.
# Never special-case asset assumptions outside this file.
#
# contract_notional: value per base unit for P&L calculation
#   forex:    100_000 (standard lot)
#   crypto:   1.0 (qty is in base asset units)
#   futures:  pointvalue (from broker spec)
#   synthetic: 1.0 (Deriv synthetics trade as crypto-like on multipliers)
#
# pip_size: price movement per 1 pip
# point_value: for futures/indices — MT5 syminfo.pointvalue equivalent

instruments:

  # ── Tier S: Deriv synthetics ──────────────────────────────────────────────
  - symbol: VOLATILITY_75_INDEX
    deriv_code: R_75
    bybit_symbol: null
    mt5_symbol: Volatility 75 Index
    asset_class: synthetic
    pip_size: 0.01
    contract_notional: 1.0
    min_unit: 0.01
    session_profile: "24_7"
    preferred_venue: deriv_multiplier
    point_value: null

